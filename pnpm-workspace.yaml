allowBuilds:
  esbuild: true
  sharp: true
overrides:
  devalue: ">=5.8.1"
  mermaid: ">=11.14.1"
  yaml: ">=2.8.3"
# Prevent installing new versions of packages for at least 72 hours (4320 minutes)
# after the last release. This allows time for testing and feedback before new
# versions are widely adopted.
minimumReleaseAge: 4320
